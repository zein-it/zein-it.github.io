    <style>
        * {
            font-family: 'Calibri';
            color: #fff;

            margin: 0;
            padding: 0px;
        }
        body {
            -webkit-touch-callout: none; 
            -webkit-user-select: none;
            -khtml-user-select: none; 
            -moz-user-select: none; 
            -ms-user-select: none;
            user-select: none;

            background-repeat: no-repeat;
            background-attachment: fixed; 
            background-position: center; 
            background-size: cover;
        }
        footer .hak-cipta {
            text-align: center;
            font-size: 16px;
            padding-bottom: 10px;
        }
        .tbl-back img {
            position: absolute;
            /* left: 15%; */
            left: 8%;
            width: 30px;
            top: 7%;
            height: auto;
            box-shadow: none;
            border-radius: 0px;
        }
        .tbl-back img:hover {
            box-shadow: 0px 0px 4px 4px mediumvioletred;
            transition: all 0.2s ease-in-out;
            transform: scale(1.3);
        }
        .judul {
            /* color: #000; */
            color: #fff;
            text-align: center;
            font-weight: bold;
            font-style: normal;
            font-size: xx-large;
            /* text-shadow: 0px 0px 10px rgba(125, 193, 206,.7); */
            padding-top: 3%;
            margin-bottom: 0px;
        }
        .sub-judul {
            width: 85%;
            display: block;
            margin: auto;
            margin-bottom: -20px;
            text-align: center;
            }

        h3 {
            font-family: josefin sans;
            font-size: 25px;
            text-align: center;
            text-transform: capitalize;
            font-weight: 600;
            padding: 30px 0px;
            width: 80%;
            margin: auto;
        }

        .container {
            width: 85%;
            margin: auto;
            padding: 30px 0px;
        }

        .container > a {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            margin: 2%;
        }

        .container a img:hover{
            transition: all 0.2s ease-in-out;
            transform: scale(1.05);
            box-shadow: 0px 0px 10px 5px mediumvioletred;
        }

        .container > a > img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            box-shadow: 0px 0px 10px #000;
        }

        .container {
            display: grid;
            grid-gap: 5px;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            grid-auto-rows: 150px;
            grid-auto-flow: dense;
        }

        .horizontal {
            grid-column: span 2;
        }

        .vertical {
            grid-row: span 2;
            align-items: baseline;
        }

        .big {
            grid-column: span 2;
            grid-row: span 2;
        }

        @media screen and (max-width:1090px) {
            .tbl-back img {
            position: absolute;
            left: 9%;
            width: 30px;
            top: 7%;
            /* padding-top: 1.5%; */
            height: auto;
            box-shadow: none;
            border-radius: 0px;
            }
        }
        @media screen and (max-width:490px) {
